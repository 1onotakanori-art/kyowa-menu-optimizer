name: Weekly Menu Scrape

on:
  schedule:
    # 毎週日曜日 21:00 JST (= 12:00 UTC)
    - cron: '0 12 * * 0'
  workflow_dispatch:
    inputs:
      days:
        description: '取得する日数'
        required: false
        default: '5'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run menu scraper
        id: scrape
        run: node prescrap.js ${{ github.event.inputs.days || '5' }}
        env:
          TZ: Asia/Tokyo

      - name: Upload debug screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug-screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Check for changes
        id: check
        run: |
          git diff --quiet menus/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push menu data
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add menus/
          git commit -m "chore: auto-update menu data ($(date +%Y-%m-%d))"
          git push origin main
