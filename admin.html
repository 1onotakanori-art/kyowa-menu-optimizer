<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 管理者ページ - 食事記録</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 管理者ページ専用スタイル */
    .hidden {
      display: none !important;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: white;
      border-bottom: 1px solid var(--medium-gray);
    }

    .admin-content {
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .section-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-selector {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    .date-selector input {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--medium-gray);
      border-radius: 8px;
      font-size: 16px;
    }

    .load-button {
      padding: 12px 24px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .menu-selection {
      display: grid;
      gap: 8px;
    }

    .menu-checkbox-item {
      display: flex;
      align-items: center;
      padding: 12px;
      background: var(--light-gray);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* ホバー効果はマウスのみ（タッチデバイスでは無効） */
    @media (hover: hover) {
      .menu-checkbox-item:hover {
        background: #e0e0e0;
      }
    }

    /* タッチデバイス用のアクティブ状態 */
    .menu-checkbox-item:active {
      background: #e0e0e0;
      transition: none;
    }

    .menu-checkbox-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .menu-checkbox-label {
      flex: 1;
      min-width: 120px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
    }

    .menu-nutrition-info {
      display: flex;
      gap: 4px;
      flex-wrap: nowrap;
      align-items: center;
    }

    @media (max-width: 600px) {
      .menu-nutrition-info {
        width: 100%;
        justify-content: space-between;
        margin-left: 32px;
      }
    }

    .nutrition-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 3px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      min-width: 42px;
      flex: 1;
    }

    .nutrition-badge.energy {
      background: rgba(255, 99, 71, 0.15);
      color: #d63031;
      border: 1.5px solid rgba(255, 99, 71, 0.4);
    }

    .nutrition-badge.protein {
      background: rgba(52, 152, 219, 0.15);
      color: #2980b9;
      border: 1.5px solid rgba(52, 152, 219, 0.4);
    }

    .nutrition-badge.fat {
      background: rgba(241, 196, 15, 0.15);
      color: #d4a60a;
      border: 1.5px solid rgba(241, 196, 15, 0.4);
    }

    .nutrition-badge.carb {
      background: rgba(46, 204, 113, 0.15);
      color: #27ae60;
      border: 1.5px solid rgba(46, 204, 113, 0.4);
    }

    .nutrition-badge.veg {
      background: rgba(155, 89, 182, 0.15);
      color: #8e44ad;
      border: 1.5px solid rgba(155, 89, 182, 0.4);
    }

    .nutrition-label-small {
      font-weight: 900;
      margin-right: 2px;
    }

    @media (max-width: 600px) {
      .nutrition-badge {
        font-size: 10px;
        padding: 2px 5px;
        min-width: 38px;
      }
    }

    .save-button {
      width: 100%;
      padding: 16px;
      background: var(--success-color);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
    }

    .save-button:disabled {
      background: var(--medium-gray);
      cursor: not-allowed;
    }

    .history-list {
      display: grid;
      gap: 12px;
    }

    .history-item {
      padding: 16px;
      background: var(--light-gray);
      border-radius: 8px;
      border-left: 4px solid var(--primary-color);
    }

    .history-date {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .history-menus {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .status-message {
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
    }

    .status-success {
      background: #d4edda;
      color: #155724;
    }

    .status-error {
      background: #f8d7da;
      color: #721c24;
    }

    .status-warning {
      background: #fff3cd;
      color: #856404;
    }

    .status-info {
      background: #d1ecf1;
      color: #0c5460;
    }

    .nutrition-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px;
      margin-top: 16px;
      padding: 16px;
      background: #f0f8ff;
      border-radius: 8px;
    }

    .nutrition-summary-item {
      text-align: center;
    }

    .nutrition-summary-label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 700;
    }

    .nutrition-summary-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary-color);
      margin-top: 4px;
    }

    /* 星評価スタイル */
    .star-rating {
      display: flex;
      gap: 4px;
      align-items: center;
      margin-left: auto;
      padding: 0 4px;
    }

    .star {
      font-size: 18px;
      cursor: pointer;
      transition: all 0.1s ease;
      user-select: none;
    }

    .star:active {
      transform: scale(1.3);
    }
  </style>
</head>
<body>
  <!-- メイン画面 -->
  <div id="main-screen" class="app-container">
    <!-- ヘッダー -->
    <div class="admin-header">
      <h1 style="font-size: 20px; margin: 0;">🍽️ 食事記録管理</h1>
    </div>

    <div class="admin-content">
      <!-- 日付選択 & メニュー読込 -->
      <div class="section-card">
        <div class="section-title">📅 日付選択</div>
        <div class="date-selector">
          <input type="date" id="date-input" class="form-input">
          <button id="load-menus-button" class="load-button">メニュー読込</button>
        </div>
        <div id="load-status" class="hidden"></div>
      </div>

      <!-- メニュー選択 -->
      <div class="section-card">
        <div class="section-title">
          🍱 食べたメニューを選択
          <span id="selected-count" style="font-size: 14px; color: var(--text-secondary); font-weight: 400;">(0件)</span>
        </div>
        <div id="menu-selection" class="menu-selection">
          <p style="color: var(--text-secondary); text-align: center;">日付を選択してメニューを読み込んでください</p>
        </div>

        <!-- 栄養合計 -->
        <div id="nutrition-summary" class="nutrition-summary hidden">
          <div class="nutrition-summary-item">
            <div class="nutrition-summary-label">エネルギー</div>
            <div id="summary-energy" class="nutrition-summary-value">0</div>
          </div>
          <div class="nutrition-summary-item">
            <div class="nutrition-summary-label">たんぱく質</div>
            <div id="summary-protein" class="nutrition-summary-value">0</div>
          </div>
          <div class="nutrition-summary-item">
            <div class="nutrition-summary-label">脂質</div>
            <div id="summary-fat" class="nutrition-summary-value">0</div>
          </div>
          <div class="nutrition-summary-item">
            <div class="nutrition-summary-label">炭水化物</div>
            <div id="summary-carb" class="nutrition-summary-value">0</div>
          </div>
          <div class="nutrition-summary-item">
            <div class="nutrition-summary-label">野菜重量</div>
            <div id="summary-veg" class="nutrition-summary-value">0</div>
          </div>
        </div>

        <button id="save-button" class="save-button" disabled>💾 記録を保存</button>
        <div id="save-status" class="hidden"></div>
      </div>

      <!-- 履歴表示 -->
      <div class="section-card">
        <div class="section-title">📊 最近の記録</div>
        <div id="history-list" class="history-list">
          <p style="color: var(--text-secondary); text-align: center;">記録がありません</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js"></script>
</body>
</html>
